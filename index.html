<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Map Explorer</title>
    <link rel="icon" href="ICON.PNG" type="image/png">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>
<body> 
    <header class="header">
        <div class="container">
            <h1 class="title">🌍 Weather Explorer</h1>
            <p class="subtitle">Find weather information anywhere in the world</p>
        </div>
    </header>

    <div class="controls">
        <div class="search-container">
            <input type="search" placeholder="Search a location..." id="SearchBar" class="search-input">
            <button class="btn btn-search" id="searchBtn">
                <span>Search</span>
            </button>
        </div>
        <button class="btn btn-location" id="locationBtn">
            <span>📍 My Location</span>
        </button>
    </div>

    <div id="map"></div>
    <div id="weather-card"></div>

    <script src="index.js"></script>
</body>
</html>
